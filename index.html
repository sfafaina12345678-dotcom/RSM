<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPD Slip Generator</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 11pt;
            background: #f5f5f5;
        }
        
        /* Page 1 - Entry Form */
        .entry-page {
            width: 100%;
            min-height: 100vh;
            padding: 40px;
            background: white;
        }
        .entry-page h2 {
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: inline-block;
            width: 120px;
            font-weight: bold;
        }
        .form-group input {
            padding: 8px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            padding: 12px 30px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            margin-right: 10px;
        }
        .btn:hover {
            background: #0056b3;
        }

        /* Page 2 - A4 Slip */
        .a4-page {
            display: none;
            width: 210mm;
            height: 297mm;
            position: relative;
            background: white;
        }
        .patient-details {
            position: absolute;
            top: 85mm;
            right: 20mm;
            width: 90mm;
        }
        .patient-details table {
            width: 100%;
            border-collapse: collapse;
        }
        .patient-details td {
            padding: 1.5mm 0;
            vertical-align: top;
            font-size: 11pt;
        }
        .patient-details td:first-child {
            font-weight: bold;
            width: 25mm;
        }
        .patient-details td:nth-child(3) {
            font-weight: bold;
            width: 15mm;
        }
        .doctor-details {
            position: absolute;
            bottom: 30mm;
            right: 20mm;
            text-align: right;
            font-size: 11pt;
        }
        .doctor-details p {
            margin-bottom: 1mm;
            line-height: 1.3;
        }

        /* Print Rules */
        @media print {
            body {
                background: white;
            }
            .entry-page {
                display: none !important;
            }
            .a4-page {
                display: block !important;
            }
        }
    </style>
</head>
<body>
    <!-- PAGE 1: ENTRY FORM -->
    <div class="entry-page" id="entryPage">
        <h2>OPD Slip - Patient Entry</h2>
        <div class="form-group">
            <label>UHID:</label>
            <input type="text" id="uhid" value="RSM 6001">
        </div>
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" value="Mr mahesh">
        </div>
        <div class="form-group">
            <label>Address:</label>
            <input type="text" id="address" value="Hathgam">
        </div>
        <div class="form-group">
            <label>Mobile:</label>
            <input type="text" id="mobile" value="9535384500">
        </div>
        <div class="form-group">
            <label>Time:</label>
            <input type="text" id="time" value="12:14:19">
        </div>
        <div class="form-group">
            <label>OPID:</label>
            <input type="text" id="opid" value="OP202606300027">
        </div>
        <div class="form-group">
            <label>Age:</label>
            <input type="text" id="age" value="25-Year/Male">
        </div>
        <div class="form-group">
            <label>Date:</label>
            <input type="text" id="date" value="30/06/2026">
        </div>
        <div class="form-group">
            <label>Valid Upto:</label>
            <input type="text" id="validupto" value="04/07/2026">
        </div>
        <div class="form-group">
            <label>Print Time:</label>
            <input type="text" id="printtime" value="12:14:00">
        </div>
        
        <button class="btn" onclick="showSlip()">Generate Slip</button>
        <button class="btn" onclick="window.print()">Print Slip</button>
    </div>

    <!-- PAGE 2: A4 SLIP -->
    <div class="a4-page" id="printPage">
        <!-- Patient Details - Top Right -->
        <div class="patient-details">
            <table>
                <tr>
                    <td>UHID</td>
                    <td>: <span id="out-uhid"></span></td>
                    <td>OPID</td>
                    <td>: <span id="out-opid"></span></td>
                </tr>
                <tr>
                    <td>Name</td>
                    <td>: <span id="out-name"></span></td>
                    <td>Age</td>
                    <td>: <span id="out-age"></span></td>
                </tr>
                <tr>
                    <td>Address</td>
                    <td colspan="3">: <span id="out-address"></span></td>
                </tr>
                <tr>
                    <td>Mobile</td>
                    <td>: <span id="out-mobile"></span></td>
                    <td>Date</td>
                    <td>: <span id="out-date"></span></td>
                </tr>
                <tr>
                    <td>Time</td>
                    <td colspan="3">: <span id="out-time"></span></td>
                </tr>
            </table>
        </div>

        <!-- Doctor Details - Bottom Right - Ab Right Me -->
        <div class="doctor-details">
            <p><b>DR. ASHOK PATEL</b></p>
            <p>MBBS,</p>
            <p>PHYSICIAN</p>
            <p>Valid Upto : <span id="out-validupto"></span></p>
            <p id="out-printtime"></p>
        </div>
    </div>

    <script>
        function showSlip() {
            document.getElementById('out-uhid').innerText = document.getElementById('uhid').value;
            document.getElementById('out-name').innerText = document.getElementById('name').value;
            document.getElementById('out-address').innerText = document.getElementById('address').value;
            document.getElementById('out-mobile').innerText = document.getElementById('mobile').value;
            document.getElementById('out-time').innerText = document.getElementById('time').value;
            document.getElementById('out-opid').innerText = document.getElementById('opid').value;
            document.getElementById('out-age').innerText = document.getElementById('age').value;
            document.getElementById('out-date').innerText = document.getElementById('date').value;
            document.getElementById('out-validupto').innerText = document.getElementById('validupto').value;
            document.getElementById('out-printtime').innerText = document.getElementById('printtime').value;
            
            document.getElementById('entryPage').style.display = 'none';
            document.getElementById('printPage').style.display = 'block';
        }
    </script>
</body>
</html>
